name: Executing Impacted Tests

on:
  repository_dispatch:
    types: [dev_push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Karate Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Banking Dev Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/fintech-impact-services
          path: dev-app
          token: ${{ secrets.KARATE_REPO_PAT }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # -----------------------------
      # START SPRING BOOT
      # -----------------------------
      - name: Start Banking Application
        run: |
          cd dev-app
          mvn spring-boot:run > app.log 2>&1 &

          echo "Waiting for Impact API to be ready..."

          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://localhost:8080/api/dev-ops/test-selector?targetBranch=main~1)

            if [ "$STATUS" = "200" ]; then
              echo "✔ Spring Boot is READY"
              break
            fi

            echo "Waiting... attempt $i"
            sleep 2
          done

      # -----------------------------
      # RUN IMPACT ANALYSIS
      # -----------------------------
      - name: Run Impacted Tests
        run: |
          chmod +x run-impacted-test.sh
          ./run-impacted-test.sh

      # -----------------------------
      # ARTIFACTS
      # -----------------------------
      - name: Upload Karate Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: karate-html-report
          path: target/karate-reports/

      - name: Upload Test Metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: impact-metrics
          path: metrics.json